<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymLog">
<title>GymLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0A;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SK="gymlog_v6";
const DEF={
  days:[{name:"Tag 1 – Brust/Schulter",desc:"Push Day",exercises:[
    {name:"Schrägbankdrücken LH",sets:4},{name:"Flachbankdrücken KH",sets:3},
    {name:"Schulterdrücken KH",sets:3},{name:"Seitheben",sets:4},
    {name:"Kabelzüge Brust",sets:3},{name:"Trizeps Rope Pushdown",sets:3},
    {name:"Brust Kabel/Maschine",sets:4}]}],
  history:[],prs:{},bodyweight:[],weekGoal:3
};

const C={bg:"#0A0A0A",surface:"#141414",surface2:"#1E1E1E",border:"#252525",text:"#F0F0F0",muted:"#555",muted2:"#888",yellow:"#E8FF47",green:"#47FFC8",red:"#FF4747",blue:"#47B8FF",orange:"#FF8C47"};
const fmtTime=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
const fmtDate=ts=>new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});
const fmtDateFull=ts=>new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
const getWeekKey=ts=>{const d=new Date(ts);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().split("T")[0];};

function MiniChart({data,color=C.yellow,unit="kg"}){
  if(!data||data.length<2)return<div style={{fontSize:11,color:C.muted,padding:"12px 0"}}>Noch zu wenig Daten!</div>;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=320,H=90,PAD=20;
  const pts=data.map((d,i)=>({x:PAD+(i/(data.length-1))*(W-PAD*2),y:PAD+(1-(d.value-min)/range)*(H-PAD*2),...d}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
  const area=`${path} L ${pts[pts.length-1].x} ${H} L ${pts[0].x} ${H} Z`;
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={H} style={{display:"block",maxWidth:"100%"}}>
        <defs><linearGradient id={`g${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient></defs>
        <path d={area} fill={`url(#g${color.replace("#","")})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill={color}/>
            <text x={p.x} y={H-1} textAnchor="middle" fill={C.muted} fontSize="9">{fmtDate(p.date)}</text>
            <text x={p.x} y={p.y-9} textAnchor="middle" fill={color} fontSize="10" fontWeight="bold">{p.value}{unit}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function App(){
  const [db,setDb]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(SK));return d?{...DEF,...d}:DEF;}catch{return DEF;}});
  const [page,setPage]=useState("home");
  const [aw,setAw]=useState(null); // activeWorkout
  const [wSecs,setWSecs]=useState(0);
  const [modal,setModal]=useState(null);
  const [tSecs,setTSecs]=useState(0);
  const [tRunning,setTRunning]=useState(false);
  const [showTimer,setShowTimer]=useState(false);
  const [selSets,setSelSets]=useState(3);
  const [curEx,setCurEx]=useState(null);
  const [curSet,setCurSet]=useState(null);
  const [newDayName,setNewDayName]=useState("");
  const [newDayDesc,setNewDayDesc]=useState("");
  const [newExName,setNewExName]=useState("");
  const [sw,setSw]=useState("");
  const [sr,setSr]=useState("");
  const [progEx,setProgEx]=useState(null);
  const [toast,setToast]=useState(null);
  const [bwInput,setBwInput]=useState("");
  const [weekGoalInput,setWeekGoalInput]=useState("");
  const [copyFromDay,setCopyFromDay]=useState(null);
  const wRef=useRef(null);
  const tRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify(db));}catch{}},[db]);
  useEffect(()=>{
    if(aw){wRef.current=setInterval(()=>setWSecs(s=>s+1),1000);}
    else{clearInterval(wRef.current);setWSecs(0);}
    return()=>clearInterval(wRef.current);
  },[aw]);
  useEffect(()=>{
    if(tRunning){tRef.current=setInterval(()=>setTSecs(s=>{if(s<=1){clearInterval(tRef.current);setTRunning(false);return 0;}return s-1;}),1000);}
    return()=>clearInterval(tRef.current);
  },[tRunning]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  // ── WEEK STATS ──
  const getWeekStats=()=>{
    const now=getWeekKey(Date.now());
    const thisWeek=db.history.filter(h=>getWeekKey(h.date)===now);
    const streak=()=>{
      let s=0;const weeks=new Set(db.history.map(h=>getWeekKey(h.date)));
      let d=new Date();
      while(true){
        const k=getWeekKey(d.getTime());
        if(!weeks.has(k)&&k!==now)break;
        if(weeks.has(k))s++;
        d.setDate(d.getDate()-7);
        if(s>52)break;
      }
      return s;
    };
    return{count:thisWeek.length,goal:db.weekGoal||3,streak:streak()};
  };

  // ── VOLUME ──
  const calcVolume=exercises=>exercises.reduce((total,ex)=>total+ex.sets.reduce((s,set)=>s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);

  // ── PROGRESS ──
  const getProgressData=exName=>{
    const data=[];
    [...db.history].reverse().forEach(s=>{
      const ex=s.exercises.find(e=>e.name===exName);
      if(ex&&ex.sets.length>0){const maxW=Math.max(...ex.sets.map(s=>parseFloat(s.weight)||0));if(maxW>0)data.push({date:s.date,value:maxW});}
    });
    return data;
  };
  const getAllExNames=()=>{const n=new Set();db.history.forEach(s=>s.exercises.forEach(e=>n.add(e.name)));return[...n];};
  const getLastWeight=exName=>{for(const s of db.history){const ex=s.exercises.find(e=>e.name===exName);if(ex&&ex.sets.length>0){const w=ex.sets[ex.sets.length-1].weight;if(w)return w;}}return"";};

  // ── EXPORT/IMPORT ──
  const exportData=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="gymlog_backup.json";a.click();
    URL.revokeObjectURL(url);showToast("✓ Backup gespeichert!");
  };
  const importData=()=>{
    const input=document.createElement("input");input.type="file";input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.days&&d.history){setDb({...DEF,...d});showToast("✓ Daten wiederhergestellt!");}else showToast("⚠ Ungültige Datei");}catch{showToast("⚠ Fehler");}};
      reader.readAsText(file);
    };input.click();
  };

  // ── DAYS ──
  const saveDay=()=>{
    if(!newDayName.trim())return;
    setDb(d=>({...d,days:[...d.days,{name:newDayName.trim(),desc:newDayDesc.trim(),exercises:[]}]}));
    setNewDayName("");setNewDayDesc("");setModal(null);
  };
  const deleteDay=i=>{if(!confirm("Tag löschen?"))return;setDb(d=>({...d,days:d.days.filter((_,idx)=>idx!==i)}));};
  const moveEx=(ei,dir)=>{
    setAw(w=>{
      const exs=[...w.exercises];
      const ni=ei+dir;if(ni<0||ni>=exs.length)return w;
      [exs[ei],exs[ni]]=[exs[ni],exs[ei]];
      return{...w,exercises:exs};
    });
  };

  // ── WORKOUT ──
  const startWorkout=dayIdx=>{
    const day=db.days[dayIdx];
    setAw({dayId:dayIdx,dayName:day.name,startTime:Date.now(),
      exercises:day.exercises.map(e=>({name:e.name,sets:Array(e.sets).fill(null).map(()=>({weight:"",reps:"",done:false}))}))});
    setPage("workout");
  };
  const addExercise=()=>{
    if(!newExName.trim()||!aw)return;
    const ex={name:newExName.trim(),sets:Array(selSets).fill(null).map(()=>({weight:"",reps:"",done:false}))};
    setAw(w=>({...w,exercises:[...w.exercises,ex]}));
    setDb(d=>{const days=[...d.days];if(!days[aw.dayId].exercises.find(e=>e.name===newExName.trim()))days[aw.dayId]={...days[aw.dayId],exercises:[...days[aw.dayId].exercises,{name:newExName.trim(),sets:selSets}]};return{...d,days};});
    setNewExName("");setModal(null);
  };
  const copyExercises=fromDayIdx=>{
    if(!aw)return;
    const fromDay=db.days[fromDayIdx];
    const existing=new Set(aw.exercises.map(e=>e.name));
    const toAdd=fromDay.exercises.filter(e=>!existing.has(e.name)).map(e=>({name:e.name,sets:Array(e.sets).fill(null).map(()=>({weight:"",reps:"",done:false}))}));
    setAw(w=>({...w,exercises:[...w.exercises,...toAdd]}));
    showToast(`✓ ${toAdd.length} Übungen kopiert`);
    setModal(null);setCopyFromDay(null);
  };
  const openSetModal=(ei,si)=>{
    setCurEx(ei);setCurSet(si);
    const s=aw.exercises[ei].sets[si];
    const lw=getLastWeight(aw.exercises[ei].name);
    setSw(s.weight||lw||"");setSr(s.reps||"");setModal("set");
  };
  const deleteSet=(ei,si)=>setAw(w=>({...w,exercises:w.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.filter((_,s)=>s!==si)})}));
  const saveSetData=startTimerSec=>{
    if(curEx===null)return;
    const exName=aw.exercises[curEx].name;
    const vol=parseFloat(sw)*parseInt(sr);
    let isPR=false;
    if(!isNaN(vol)&&(!db.prs[exName]||vol>db.prs[exName].vol)){
      setDb(d=>({...d,prs:{...d.prs,[exName]:{vol,weight:sw,reps:sr,date:Date.now()}}}));isPR=true;
    }
    setAw(w=>({...w,exercises:w.exercises.map((ex,ei)=>ei!==curEx?ex:{...ex,sets:ex.sets.map((s,si)=>si!==curSet?s:{weight:sw,reps:sr,done:true,isPR})})}));
    setModal(null);
    if(startTimerSec){setTSecs(startTimerSec);setTRunning(true);setShowTimer(true);}
  };
  const finishWorkout=()=>{
    if(!confirm("Training abschliessen?"))return;
    const vol=calcVolume(aw.exercises);
    setDb(d=>({...d,history:[{date:aw.startTime,dayName:aw.dayName,duration:wSecs,volume:vol,
      exercises:aw.exercises.map(ex=>({name:ex.name,sets:ex.sets.filter(s=>s.done)}))
    },...d.history]}));
    setAw(null);setPage("history");
  };

  // ── BODY WEIGHT ──
  const saveBodyweight=()=>{
    const val=parseFloat(bwInput);if(isNaN(val)||val<20||val>300)return showToast("⚠ Ungültiges Gewicht");
    setDb(d=>({...d,bodyweight:[...( d.bodyweight||[]),{date:Date.now(),value:val}].slice(-60)}));
    setBwInput("");showToast("✓ Körpergewicht gespeichert!");
  };

  const ws=getWeekStats();
  const btnBase={border:"none",cursor:"pointer",fontFamily:"inherit",borderRadius:10,padding:"12px 18px",fontSize:12,fontWeight:700,letterSpacing:1,margin:"8px 16px",width:"calc(100% - 32px)"};
  const inp={background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontFamily:"inherit",fontSize:14,padding:"10px 12px",width:"100%",outline:"none"};
  const lbl={fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4,display:"block"};
  const hdr={padding:"20px 18px 16px",position:"sticky",top:0,background:C.bg,zIndex:50,borderBottom:`1px solid ${C.border}`};

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'DM Mono','Courier New',monospace",maxWidth:430,margin:"0 auto",paddingBottom:80}}>

      {/* TOAST */}
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:C.green,color:"#000",borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:700,zIndex:300,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>{toast}</div>}

      {/* TIMER */}
      {showTimer&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:4,marginBottom:12}}>PAUSENTIMER</div>
          <div style={{fontSize:80,fontWeight:700,color:tSecs>0?C.yellow:C.green,letterSpacing:-2}}>{fmtTime(tSecs)}</div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:3,marginTop:8}}>{tSecs>0?"läuft...":"✓ fertig!"}</div>
          <div style={{display:"flex",gap:10,marginTop:28,flexWrap:"wrap",justifyContent:"center"}}>
            {[60,90,120,150].map(t=>(
              <button key={t} onClick={()=>{clearInterval(tRef.current);setTSecs(t);setTRunning(true);}} style={{background:C.surface2,color:C.muted2,borderRadius:8,padding:"10px 16px",fontSize:12,fontFamily:"inherit",cursor:"pointer",border:"none"}}>{fmtTime(t)}</button>
            ))}
          </div>
          <button onClick={()=>{clearInterval(tRef.current);setShowTimer(false);setTRunning(false);}} style={{marginTop:20,background:C.red,color:"#fff",borderRadius:10,padding:"12px 36px",fontSize:14,fontWeight:700,fontFamily:"inherit",cursor:"pointer",border:"none"}}>FERTIG</button>
        </div>
      )}

      {/* PROGRESS MODAL */}
      {progEx&&(
        <div onClick={()=>setProgEx(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:180,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#111",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:430,padding:"24px 20px 40px",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontSize:16,fontWeight:700}}>{progEx}</div>
              <button onClick={()=>setProgEx(null)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 10px",fontSize:12,border:"none",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:16}}>GEWICHTSENTWICKLUNG</div>
            <MiniChart data={getProgressData(progEx)} color={C.yellow}/>
            <div style={{marginTop:20}}>
              {getProgressData(progEx).map((d,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                  <span style={{color:C.muted}}>{fmtDateFull(d.date)}</span>
                  <span style={{fontWeight:700,color:C.yellow}}>{d.value} kg</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* MAIN MODAL */}
      {modal&&(
        <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:150,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#111",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:430,padding:"24px 20px 40px",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontSize:16,fontWeight:700}}>
                {modal==="day"?"Trainingstag erstellen":modal==="exercise"?"Übung hinzufügen":modal==="settings"?"Einstellungen":modal==="copy"?"Übungen kopieren von":modal==="bw"?"Körpergewicht":modal==="weekgoal"?"Wochenziel":`${aw?.exercises[curEx]?.name} – Satz ${(curSet??0)+1}`}
              </div>
              <button onClick={()=>setModal(null)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 10px",fontSize:12,border:"none",cursor:"pointer"}}>✕</button>
            </div>

            {modal==="day"&&<>
              <div style={{marginBottom:14}}><label style={lbl}>NAME</label><input style={inp} value={newDayName} onChange={e=>setNewDayName(e.target.value)} placeholder="z.B. Tag 2 – Rücken"/></div>
              <div style={{marginBottom:20}}><label style={lbl}>BESCHREIBUNG</label><input style={inp} value={newDayDesc} onChange={e=>setNewDayDesc(e.target.value)} placeholder="z.B. Pull Day"/></div>
              <button onClick={saveDay} style={{...btnBase,background:C.yellow,color:"#000",margin:"0",width:"100%"}}>ERSTELLEN</button>
            </>}

            {modal==="exercise"&&<>
              <div style={{marginBottom:14}}><label style={lbl}>ÜBUNGSNAME</label><input style={inp} value={newExName} onChange={e=>setNewExName(e.target.value)} placeholder="z.B. Bankdrücken"/></div>
              <div style={{marginBottom:20}}>
                <label style={lbl}>ANZAHL SÄTZE</label>
                <div style={{display:"flex",gap:8}}>
                  {[1,2,3,4,5].map(n=>(
                    <button key={n} onClick={()=>setSelSets(n)} style={{background:selSets===n?C.yellow:C.surface2,color:selSets===n?"#000":C.muted2,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>{n}</button>
                  ))}
                </div>
              </div>
              <button onClick={addExercise} style={{...btnBase,background:C.yellow,color:"#000",margin:"0 0 8px",width:"100%"}}>HINZUFÜGEN</button>
              {db.days.length>1&&<button onClick={()=>setModal("copy")} style={{...btnBase,background:C.surface2,color:C.muted2,margin:"0",width:"100%"}}>📋 VON ANDEREM TAG KOPIEREN</button>}
            </>}

            {modal==="copy"&&<>
              <div style={{fontSize:11,color:C.muted,marginBottom:16}}>Wähle einen Tag um alle Übungen zu kopieren:</div>
              {db.days.filter((_,i)=>i!==aw?.dayId).map((d,i)=>(
                <div key={i} onClick={()=>copyExercises(db.days.indexOf(d))} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
                  <div style={{fontSize:13,fontWeight:700}}>{d.name}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{d.exercises.length} Übungen</div>
                </div>
              ))}
            </>}

            {modal==="settings"&&<>
              <button onClick={()=>{exportData();setModal(null);}} style={{...btnBase,background:C.yellow,color:"#000",margin:"0 0 8px",width:"100%"}}>📤 DATEN EXPORTIEREN</button>
              <button onClick={()=>{importData();setModal(null);}} style={{...btnBase,background:C.surface2,color:C.text,margin:"0 0 8px",width:"100%"}}>📥 DATEN IMPORTIEREN</button>
              <div style={{marginBottom:14,marginTop:8}}>
                <label style={lbl}>WOCHENZIEL (Trainingstage)</label>
                <div style={{display:"flex",gap:8}}>
                  {[2,3,4,5,6].map(n=>(
                    <button key={n} onClick={()=>setDb(d=>({...d,weekGoal:n}))} style={{background:db.weekGoal===n?C.yellow:C.surface2,color:db.weekGoal===n?"#000":C.muted2,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>{n}</button>
                  ))}
                </div>
              </div>
              <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
                <button onClick={()=>{if(confirm("ALLE Daten löschen?")){setDb(DEF);setModal(null);showToast("Daten gelöscht");}}} style={{...btnBase,background:"#2A0A0A",color:C.red,border:`1px solid #3A1010`,margin:"0",width:"100%"}}>🗑 ALLE DATEN LÖSCHEN</button>
              </div>
            </>}

            {modal==="bw"&&<>
              <div style={{marginBottom:16}}>
                <label style={lbl}>KÖRPERGEWICHT (kg)</label>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...inp,flex:1}} type="number" inputMode="decimal" step="0.1" value={bwInput} onChange={e=>setBwInput(e.target.value)} placeholder="z.B. 82.5"/>
                  <button onClick={saveBodyweight} style={{background:C.yellow,color:"#000",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>+</button>
                </div>
              </div>
              {(db.bodyweight||[]).length>0&&<>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:12}}>VERLAUF</div>
                <MiniChart data={(db.bodyweight||[]).map(b=>({date:b.date,value:b.value}))} color={C.blue} unit="kg"/>
                <div style={{marginTop:16}}>
                  {[...(db.bodyweight||[])].reverse().slice(0,10).map((b,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                      <span style={{color:C.muted}}>{fmtDateFull(b.date)}</span>
                      <span style={{fontWeight:700,color:C.blue}}>{b.value} kg</span>
                    </div>
                  ))}
                </div>
              </>}
            </>}

            {modal==="set"&&<>
              {getLastWeight(aw?.exercises[curEx]?.name)&&(
                <div style={{background:C.surface2,borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:C.muted2}}>
                  Letztes Mal: <span style={{color:C.yellow,fontWeight:700}}>{getLastWeight(aw?.exercises[curEx]?.name)} kg</span>
                  <button onClick={()=>setSw(getLastWeight(aw?.exercises[curEx]?.name))} style={{background:C.yellow,color:"#000",border:"none",borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,marginLeft:8,cursor:"pointer",fontFamily:"inherit"}}>↑ ÜBERNEHMEN</button>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
                <div><label style={lbl}>GEWICHT (kg)</label><input style={inp} type="number" inputMode="decimal" step="0.5" value={sw} onChange={e=>setSw(e.target.value)} placeholder="0"/></div>
                <div><label style={lbl}>WIEDERHOLUNGEN</label><input style={inp} type="number" inputMode="numeric" value={sr} onChange={e=>setSr(e.target.value)} placeholder="0"/></div>
              </div>
              <label style={{...lbl,marginBottom:10}}>PAUSE STARTEN & SPEICHERN</label>
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                {[60,90,120,150].map(t=>(
                  <button key={t} onClick={()=>saveSetData(t)} style={{background:C.surface2,color:C.muted2,borderRadius:8,padding:"8px 14px",fontSize:12,border:"none",cursor:"pointer",fontFamily:"inherit"}}>{fmtTime(t)}</button>
                ))}
              </div>
              <button onClick={()=>saveSetData(null)} style={{...btnBase,background:C.yellow,color:"#000",margin:"0 0 8px",width:"100%"}}>SATZ SPEICHERN</button>
              <button onClick={()=>{if(confirm("Satz löschen?")){deleteSet(curEx,curSet);setModal(null);}}} style={{...btnBase,background:"#2A0A0A",color:C.red,border:`1px solid #3A1010`,margin:"0",width:"100%"}}>🗑 SATZ LÖSCHEN</button>
            </>}
          </div>
        </div>
      )}

      {/* ── HOME ── */}
      {page==="home"&&<>
        <div style={hdr}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>DEINE PLÄNE</div>
              <div style={{fontSize:24,fontWeight:700,letterSpacing:-1}}>GymLog 🏋️</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal("bw")} style={{background:C.surface2,color:C.blue,borderRadius:8,padding:"8px 12px",fontSize:16,border:"none",cursor:"pointer"}}>⚖️</button>
              <button onClick={()=>setModal("settings")} style={{background:C.surface2,color:C.muted2,borderRadius:8,padding:"8px 12px",fontSize:16,border:"none",cursor:"pointer"}}>⚙️</button>
            </div>
          </div>
        </div>

        {/* WEEK STATS */}
        <div style={{margin:"12px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:10}}>DIESE WOCHE</div>
          <div style={{display:"flex",gap:0}}>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,color:ws.count>=ws.goal?C.green:C.yellow}}>{ws.count}<span style={{fontSize:14,color:C.muted}}>/{ws.goal}</span></div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>TRAININGS</div>
            </div>
            <div style={{width:1,background:C.border}}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,color:C.orange}}>{ws.streak}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>WOCHEN STREAK 🔥</div>
            </div>
          </div>
          <div style={{marginTop:12,height:6,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min((ws.count/ws.goal)*100,100)}%`,background:ws.count>=ws.goal?C.green:C.yellow,borderRadius:3,transition:"width 0.4s"}}/>
          </div>
          {ws.count>=ws.goal&&<div style={{fontSize:11,color:C.green,marginTop:6,textAlign:"center"}}>🎉 Wochenziel erreicht!</div>}
        </div>

        {db.days.length===0&&<div style={{textAlign:"center",color:C.muted,padding:"30px 20px",fontSize:13}}>Noch kein Trainingstag.<br/>Erstelle deinen ersten Plan!</div>}
        {db.days.map((d,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"8px 16px",overflow:"hidden"}}>
            <div onClick={()=>startWorkout(i)} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <div>
                <div style={{fontSize:14,fontWeight:700}}>{d.name}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>{d.desc} · {d.exercises.length} Übungen</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={e=>{e.stopPropagation();deleteDay(i);}} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 8px",fontSize:12,border:"none",cursor:"pointer"}}>🗑</button>
                <span style={{color:C.muted,fontSize:20}}>›</span>
              </div>
            </div>
          </div>
        ))}
        <button onClick={()=>setModal("day")} style={{...btnBase,background:C.yellow,color:"#000"}}>+ TRAININGSTAG ERSTELLEN</button>
      </>}

      {/* ── WORKOUT ── */}
      {page==="workout"&&<>
        <div style={hdr}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>{fmtDateFull(aw?.startTime||Date.now())}</div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:-1}}>{aw?.dayName||"–"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:700,color:C.yellow}}>{fmtTime(wSecs)}</div>
              <div style={{fontSize:9,color:C.muted,letterSpacing:2}}>DAUER</div>
            </div>
          </div>
          {aw&&<div style={{marginTop:8,fontSize:11,color:C.muted2}}>
            Volumen: <span style={{color:C.orange,fontWeight:700}}>{Math.round(calcVolume(aw.exercises)).toLocaleString()} kg</span>
          </div>}
        </div>
        {!aw&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>Kein aktives Training.<br/>Gehe zu PLÄNE.</div>}
        {aw?.exercises.map((ex,ei)=>(
          <div key={ei} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,margin:"8px 16px"}}>
            <div style={{padding:"10px 12px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:4,flexDirection:"column"}}>
                <div style={{fontSize:13,fontWeight:700}}>{ex.name}</div>
                <div style={{fontSize:10,color:C.muted}}>{ex.sets.filter(s=>s.done).length}/{ex.sets.length} Sätze · Vol: {Math.round(ex.sets.reduce((s,set)=>s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0))} kg</div>
              </div>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>moveEx(ei,-1)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>↑</button>
                <button onClick={()=>moveEx(ei,1)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>↓</button>
                <button onClick={()=>setProgEx(ex.name)} style={{background:C.surface2,color:C.blue,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>📈</button>
                <button onClick={()=>{setTSecs(90);setTRunning(true);setShowTimer(true);}} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>⏱</button>
                <button onClick={()=>{if(confirm("Übung entfernen?"))setAw(w=>({...w,exercises:w.exercises.filter((_,i)=>i!==ei)}));}} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>🗑</button>
              </div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["SATZ","KG","WDHL.",""].map(h=><th key={h} style={{fontSize:9,color:C.muted,letterSpacing:2,padding:"4px 12px",textAlign:"left",borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>
              <tbody>
                {ex.sets.map((set,si)=>(
                  <tr key={si} style={{color:set.done?C.green:C.text}}>
                    <td style={{padding:"7px 12px",fontSize:13,borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>{si+1}</td>
                    <td style={{padding:"7px 12px",fontSize:13,borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>{set.weight||"–"}</td>
                    <td style={{padding:"7px 12px",fontSize:13,borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>{set.reps||"–"}{set.isPR?" 🏆":""}</td>
                    <td style={{padding:"7px 12px",borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>
                      <button onClick={()=>openSetModal(ei,si)} style={{background:set.done?C.green:C.surface2,color:set.done?"#000":C.muted2,borderRadius:6,padding:"4px 10px",fontSize:12,border:"none",cursor:"pointer",fontFamily:"inherit"}}>{set.done?"✓":"+"}</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ))}
        <button onClick={()=>setModal("exercise")} style={{...btnBase,background:C.surface2,color:C.muted2}}>+ ÜBUNG HINZUFÜGEN</button>
        {aw&&<button onClick={finishWorkout} style={{...btnBase,background:C.green,color:"#000"}}>✓ TRAINING ABSCHLIESSEN</button>}
        {aw&&<button onClick={()=>{if(confirm("Abbrechen?")){setAw(null);setPage("home");}}} style={{...btnBase,background:"#2A0A0A",color:C.red,border:`1px solid #3A1010`}}>TRAINING ABBRECHEN</button>}
      </>}

      {/* ── HISTORY ── */}
      {page==="history"&&<>
        <div style={hdr}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>VERLAUF</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:-1}}>Historie</div>
        </div>
        {db.history.length===0&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>Noch keine Trainings.</div>}
        {db.history.map((h,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"10px 16px",overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4}}>{fmtDateFull(h.date)}</div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{h.dayName}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[`⏱ ${fmtTime(h.duration)}`,`📋 ${h.exercises.length} Übungen`,`💪 ${h.exercises.reduce((s,e)=>s+e.sets.length,0)} Sätze`,`🔥 ${Math.round(h.volume||0).toLocaleString()} kg Vol.`].map(t=>(
                  <span key={t} style={{background:C.surface2,borderRadius:6,padding:"3px 10px",fontSize:11,color:C.muted2}}>{t}</span>
                ))}
              </div>
            </div>
            {h.exercises.map((ex,ei)=>(
              <div key={ei} style={{padding:"8px 16px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{fontSize:12,fontWeight:700}}>{ex.name}</div>
                  <button onClick={()=>setProgEx(ex.name)} style={{background:"transparent",color:C.blue,border:"none",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>📈</button>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {ex.sets.map((s,si)=><span key={si} style={{background:C.surface2,borderRadius:6,padding:"3px 8px",fontSize:11,color:s.isPR?C.yellow:C.muted2}}>{s.weight}kg×{s.reps}{s.isPR?" 🏆":""}</span>)}
                </div>
              </div>
            ))}
            <div style={{padding:"10px 16px"}}>
              <button onClick={()=>{if(confirm("Löschen?"))setDb(d=>({...d,history:d.history.filter((_,idx)=>idx!==i)}));}} style={{background:"#2A0A0A",color:C.red,border:"1px solid #3A1010",borderRadius:8,padding:"6px 14px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>Löschen</button>
            </div>
          </div>
        ))}
      </>}

      {/* ── PRs ── */}
      {page==="pr"&&<>
        <div style={hdr}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>BESTLEISTUNGEN</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:-1}}>PRs & Graphs 📈</div>
        </div>
        {Object.keys(db.prs).length===0&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>Noch keine PRs.</div>}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"10px 16px",overflow:"hidden"}}>
          {Object.keys(db.prs).sort((a,b)=>db.prs[b].vol-db.prs[a].vol).map(k=>(
            <div key={k} style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700}}>{k}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:2}}>{fmtDateFull(db.prs[k].date)}</div>
                <button onClick={()=>setProgEx(k)} style={{background:"transparent",color:C.blue,border:"none",fontSize:11,cursor:"pointer",padding:0,marginTop:4,fontFamily:"inherit"}}>📈 Entwicklung</button>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:22,fontWeight:700,color:C.yellow}}>{db.prs[k].weight} kg</div>
                <div style={{fontSize:11,color:C.muted}}>× {db.prs[k].reps} Wdhl.</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{fontSize:10,color:C.muted,letterSpacing:3,padding:"16px 16px 8px"}}>ALLE ÜBUNGEN</div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"0 16px 16px",overflow:"hidden"}}>
          {getAllExNames().map(name=>(
            <div key={name} onClick={()=>setProgEx(name)} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <div style={{fontSize:13,fontWeight:700}}>{name}</div>
              <span style={{color:C.blue}}>📈</span>
            </div>
          ))}
          {getAllExNames().length===0&&<div style={{padding:"20px 16px",fontSize:12,color:C.muted}}>Noch keine Daten.</div>}
        </div>
      </>}

      {/* NAV */}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0D0D0D",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,padding:"8px 0 12px"}}>
        {[{id:"home",label:"PLÄNE",icon:"🏠"},{id:"workout",label:"TRAINING",icon:"⏱"},{id:"history",label:"VERLAUF",icon:"📋"},{id:"pr",label:"PRs",icon:"📈"}].map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"transparent",border:"none",color:page===n.id?C.yellow:C.muted,fontSize:8,letterSpacing:1,padding:"4px 0",cursor:"pointer",fontFamily:"inherit"}}>
            <span style={{fontSize:20}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
