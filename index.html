@keyframes prPop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

let C=THEMES.dark;

const fmtTime=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
const fmtDate=ts=>new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});
const fmtDateFull=ts=>new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
const getWeekKey=ts=>{const d=new Date(ts);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().split("T")[0];};
const getGroupForName=name=>EXERCISE_DB.find(e=>e.name===name)?.group;

function playBeep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(offset=>{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ac.currentTime+offset);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+offset+0.25);
      o.start(ac.currentTime+offset);o.stop(ac.currentTime+offset+0.25);
    });
  }catch{}
}
function showNotif(){
  try{
    if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
      new Notification("GymLog – Pause vorbei! 💪",{body:"Bereit für den nächsten Satz!"});
    }
  }catch{}
}

/* ── MiniChart (line) ── */
function MiniChart({data,color=C.yellow,unit="kg"}){
  if(!data||data.length<2)return<div style={{fontSize:11,color:C.muted,padding:"12px 0"}}>Noch zu wenig Daten!</div>;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=310,H=90,PAD=20;
  const pts=data.map((d,i)=>({x:PAD+(i/(data.length-1))*(W-PAD*2),y:PAD+(1-(d.value-min)/range)*(H-PAD*2),...d}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
  const area=`${path} L ${pts[pts.length-1].x} ${H} L ${pts[0].x} ${H} Z`;
  const gid=`g${color.replace("#","")}`;
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={H} style={{display:"block",maxWidth:"100%"}}>
        <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient></defs>
        <path d={area} fill={`url(#${gid})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill={color}/>
            <text x={p.x} y={H-1} textAnchor="middle" fill={C.muted} fontSize="9">{fmtDate(p.date)}</text>
            <text x={p.x} y={p.y-9} textAnchor="middle" fill={color} fontSize="10" fontWeight="bold">{p.value}{unit}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

/* ── Weekly Volume Bar Chart ── */
function VolumeBarChart({history}){
  const weeks=useMemo(()=>{
    const map={};
    history.forEach(h=>{const k=getWeekKey(h.date);map[k]=(map[k]||0)+(h.volume||0);});
    const result=[];const now=new Date();
    for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);const k=getWeekKey(d.getTime());result.push({key:k,vol:Math.round(map[k]||0),label:fmtDate(d.getTime())});}
    return result;
  },[history]);
  const maxVol=Math.max(...weeks.map(w=>w.vol),1);
  const BAR_W=28,GAP=9,H=80;
  const W=weeks.length*(BAR_W+GAP)-GAP;
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={H} style={{display:"block"}}>
        {weeks.map((w,i)=>{
          const barH=Math.max((w.vol/maxVol)*(H-22),w.vol>0?4:0);
          const x=i*(BAR_W+GAP);
          const isThis=i===weeks.length-1;
          return(
            <g key={i}>
              <rect x={x} y={H-barH-18} width={BAR_W} height={barH} rx="4"
                fill={isThis?C.yellow:C.surface2} stroke={isThis?C.yellow:C.border} strokeWidth="1"/>
              {w.vol>0&&<text x={x+BAR_W/2} y={H-barH-22} textAnchor="middle" fill={isThis?C.yellow:C.muted2} fontSize="8">
                {w.vol>9999?`${(w.vol/1000).toFixed(0)}t`:w.vol>999?`${(w.vol/1000).toFixed(1)}t`:`${w.vol}`}
              </text>}
              <text x={x+BAR_W/2} y={H} textAnchor="middle" fill={isThis?C.muted2:C.muted} fontSize="8">{w.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ── Exercise Autocomplete Input ── */
function ExerciseInput({value,onChange}){
  const [open,setOpen]=useState(false);
  const filtered=value.length>0
    ?EXERCISE_DB.filter(e=>e.name.toLowerCase().includes(value.toLowerCase())).slice(0,7)
    :[];
  return(
    <div style={{position:"relative"}}>
      <input
        style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontFamily:"inherit",fontSize:14,padding:"10px 12px",width:"100%",outline:"none"}}
        value={value}
        onChange={e=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false),150)}
        placeholder="z.B. Bankdrücken"
        autoComplete="off"
      />
      {open&&filtered.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,zIndex:999,maxHeight:230,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,0.6)"}}>
          {filtered.map((ex,i)=>(
            <div key={i} onMouseDown={()=>{onChange(ex.name);setOpen(false);}}
              style={{padding:"10px 14px",borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,color:C.text}}>{ex.name}</span>
              <span style={{fontSize:9,color:GROUP_COLORS[ex.group]||C.muted,background:C.badgeBg,borderRadius:4,padding:"2px 7px",letterSpacing:1}}>{ex.group.toUpperCase()}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Muscle group badge ── */
function GroupBadge({group}){
  if(!group)return null;
  return<span style={{fontSize:9,color:GROUP_COLORS[group]||C.muted,background:C.badgeBg,borderRadius:4,padding:"2px 6px",letterSpacing:1,whiteSpace:"nowrap"}}>{group.toUpperCase()}</span>;
}

/* ── Main App ── */
function App(){
  const [db,setDb]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(SK));return d?{...DEF,...d}:DEF;}catch{return DEF;}});
  C=THEMES[db.theme||"dark"];
  const [page,setPage]=useState("home");
  const [aw,setAw]=useState(null);
  const [wSecs,setWSecs]=useState(0);
  const [modal,setModal]=useState(null);
  const [tSecs,setTSecs]=useState(0);
  const [tRunning,setTRunning]=useState(false);
  const [showTimer,setShowTimer]=useState(false);
  const [selSets,setSelSets]=useState(3);
  const [curEx,setCurEx]=useState(null);
  const [curSet,setCurSet]=useState(null);
  const [newDayName,setNewDayName]=useState("");
  const [newDayDesc,setNewDayDesc]=useState("");
  const [newExName,setNewExName]=useState("");
  const [sw,setSw]=useState("");
  const [sr,setSr]=useState("");
  const [progEx,setProgEx]=useState(null);
  const [toast,setToast]=useState(null);
  const [bwInput,setBwInput]=useState("");
  const [prFlash,setPrFlash]=useState(false);
  const [notifPerm,setNotifPerm]=useState(typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const reqNotif=async()=>{if(typeof Notification==="undefined")return;const p=await Notification.requestPermission();setNotifPerm(p);};
  const wRef=useRef(null);
  const tRef=useRef(null);
  const tEndRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify(db));}catch{}},[db]);
  useEffect(()=>{document.body.style.background=C.bg;},[db.theme]);

  useEffect(()=>{
    if(aw){wRef.current=setInterval(()=>setWSecs(s=>s+1),1000);}
    else{clearInterval(wRef.current);setWSecs(0);}
    return()=>clearInterval(wRef.current);
  },[aw]);

  useEffect(()=>{
    if(tRunning){
      const tick=()=>{
        const rem=Math.ceil((tEndRef.current-Date.now())/1000);
        if(rem<=0){
          clearInterval(tRef.current);setTRunning(false);setTSecs(0);
          try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}
          playBeep();showNotif();
        }else{setTSecs(rem);}
      };
      tRef.current=setInterval(tick,500);
    }
    return()=>clearInterval(tRef.current);
  },[tRunning]);

  useEffect(()=>{
    const onVisible=()=>{
      if(document.visibilityState==="visible"&&tEndRef.current&&tRunning){
        const rem=Math.ceil((tEndRef.current-Date.now())/1000);
        if(rem<=0){
          clearInterval(tRef.current);setTRunning(false);setTSecs(0);
          try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}
          playBeep();showNotif();
        }else{setTSecs(rem);}
      }
    };
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[tRunning]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  /* ── Week stats ── */
  const getWeekStats=()=>{
    const now=getWeekKey(Date.now());
    const thisWeek=db.history.filter(h=>getWeekKey(h.date)===now);
    const streak=()=>{
      let s=0;const weeks=new Set(db.history.map(h=>getWeekKey(h.date)));
      let d=new Date();
      while(true){
        const k=getWeekKey(d.getTime());
        if(!weeks.has(k)&&k!==now)break;
        if(weeks.has(k))s++;
        d.setDate(d.getDate()-7);
        if(s>52)break;
      }
      return s;
    };
    return{count:thisWeek.length,goal:db.weekGoal||3,streak:streak()};
  };

  /* ── Totals ── */
  const getTotalStats=()=>({
    sessions:db.history.length,
    volume:Math.round(db.history.reduce((s,h)=>s+(h.volume||0),0)),
    time:db.history.reduce((s,h)=>s+(h.duration||0),0),
  });

  const calcVolume=exercises=>exercises.reduce((total,ex)=>total+ex.sets.reduce((s,set)=>s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);

  const getWorkoutProgress=()=>{
    if(!aw)return 0;
    const total=aw.exercises.reduce((s,ex)=>s+ex.sets.length,0);
    const done=aw.exercises.reduce((s,ex)=>s+ex.sets.filter(s=>s.done).length,0);
    return total>0?done/total:0;
  };

  /* ── Progress data ── */
  const getProgressData=exName=>{
    const data=[];
    [...db.history].reverse().forEach(s=>{
      const ex=s.exercises.find(e=>e.name===exName);
      if(ex&&ex.sets.length>0){const maxW=Math.max(...ex.sets.map(s=>parseFloat(s.weight)||0));if(maxW>0)data.push({date:s.date,value:maxW});}
    });
    return data;
  };

  const getAllExNames=()=>{const n=new Set();db.history.forEach(s=>s.exercises.forEach(e=>n.add(e.name)));return[...n];};

  const getLastSet=exName=>{
    for(const session of db.history){
      const ex=session.exercises.find(e=>e.name===exName);
      if(ex){const valid=ex.sets.filter(s=>s.weight&&s.reps);if(valid.length>0)return valid[valid.length-1];}
    }
    return null;
  };
  const getLastWeight=exName=>getLastSet(exName)?.weight||"";

  /* ── Export/Import ── */
  const exportData=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="gymlog_backup.json";a.click();
    URL.revokeObjectURL(url);showToast("✓ Backup gespeichert!");
  };
  const importData=()=>{
    const input=document.createElement("input");input.type="file";input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.days&&d.history){setDb({...DEF,...d});showToast("✓ Daten wiederhergestellt!");}else showToast("⚠ Ungültige Datei");}catch{showToast("⚠ Fehler");}};
      reader.readAsText(file);
    };input.click();
  };

  /* ── Days ── */
  const saveDay=()=>{
    if(!newDayName.trim())return;
    setDb(d=>({...d,days:[...d.days,{name:newDayName.trim(),desc:newDayDesc.trim(),exercises:[]}]}));
    setNewDayName("");setNewDayDesc("");setModal(null);
  };
  const deleteDay=i=>{if(!confirm("Tag löschen?"))return;setDb(d=>({...d,days:d.days.filter((_,idx)=>idx!==i)}));};
  const moveEx=(ei,dir)=>{
    setAw(w=>{
      const exs=[...w.exercises];
      const ni=ei+dir;if(ni<0||ni>=exs.length)return w;
      [exs[ei],exs[ni]]=[exs[ni],exs[ei]];
      return{...w,exercises:exs};
    });
  };

  /* ── Workout ── */
  const startWorkout=dayIdx=>{
    const day=db.days[dayIdx];
    setAw({
      dayId:dayIdx,dayName:day.name,startTime:Date.now(),
      exercises:day.exercises.map(e=>({
        name:e.name,
        group:e.group||getGroupForName(e.name),
        sets:Array(e.sets).fill(null).map(()=>({weight:"",reps:"",done:false}))
      }))
    });
    setPage("workout");
  };

  const addExercise=()=>{
    if(!newExName.trim()||!aw)return;
    const group=getGroupForName(newExName.trim());
    const ex={name:newExName.trim(),group,sets:Array(selSets).fill(null).map(()=>({weight:"",reps:"",done:false}))};
    setAw(w=>({...w,exercises:[...w.exercises,ex]}));
    setDb(d=>{
      const days=[...d.days];
      if(!days[aw.dayId].exercises.find(e=>e.name===newExName.trim()))
        days[aw.dayId]={...days[aw.dayId],exercises:[...days[aw.dayId].exercises,{name:newExName.trim(),sets:selSets,group}]};
      return{...d,days};
    });
    setNewExName("");setModal(null);
  };

  const copyExercises=fromDayIdx=>{
    if(!aw)return;
    const fromDay=db.days[fromDayIdx];
    const existing=new Set(aw.exercises.map(e=>e.name));
    const toAdd=fromDay.exercises.filter(e=>!existing.has(e.name)).map(e=>({
      name:e.name,group:e.group||getGroupForName(e.name),
      sets:Array(e.sets).fill(null).map(()=>({weight:"",reps:"",done:false}))
    }));
    setAw(w=>({...w,exercises:[...w.exercises,...toAdd]}));
    showToast(`✓ ${toAdd.length} Übungen kopiert`);
    setModal(null);
  };

  const openSetModal=(ei,si)=>{
    const s=aw.exercises[ei].sets[si];
    const ls=getLastSet(aw.exercises[ei].name);
    setCurEx(ei);setCurSet(si);
    setSw(s.weight||(s.done?"":ls?.weight||""));
    setSr(s.reps||(s.done?"":ls?.reps||""));
    setModal("set");
  };

  const addSet=ei=>{
    const ex=aw.exercises[ei];
    const lastSet=ex.sets.length>0?ex.sets[ex.sets.length-1]:null;
    const newSetIdx=ex.sets.length;
    const newSet={weight:lastSet?.weight||"",reps:lastSet?.reps||"",done:false};
    setAw(w=>({...w,exercises:w.exercises.map((e,i)=>i!==ei?e:{...e,sets:[...e.sets,newSet]})}));
    setCurEx(ei);setCurSet(newSetIdx);
    setSw(newSet.weight);setSr(newSet.reps);
    setModal("set");
  };

  const deleteSet=(ei,si)=>setAw(w=>({...w,exercises:w.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.filter((_,s)=>s!==si)})}));

  const saveSetData=startTimerSec=>{
    if(curEx===null)return;
    const exName=aw.exercises[curEx].name;
    const vol=parseFloat(sw)*parseInt(sr);
    let isPR=false;
    if(!isNaN(vol)&&vol>0&&(!db.prs[exName]||vol>db.prs[exName].vol)){
      setDb(d=>({...d,prs:{...d.prs,[exName]:{vol,weight:sw,reps:sr,date:Date.now()}}}));
      isPR=true;
      setPrFlash(true);setTimeout(()=>setPrFlash(false),1800);
    }
    setAw(w=>({...w,exercises:w.exercises.map((ex,ei)=>ei!==curEx?ex:{...ex,sets:ex.sets.map((s,si)=>si!==curSet?s:{weight:sw,reps:sr,done:true,isPR})})}));
    setModal(null);
    if(startTimerSec){tEndRef.current=Date.now()+startTimerSec*1000;setTSecs(startTimerSec);setTRunning(true);setShowTimer(true);}
  };

  const finishWorkout=()=>{
    if(!confirm("Training abschliessen?"))return;
    const vol=calcVolume(aw.exercises);
    setDb(d=>({...d,history:[{
      date:aw.startTime,dayName:aw.dayName,duration:wSecs,volume:vol,
      exercises:aw.exercises.map(ex=>({name:ex.name,group:ex.group,sets:ex.sets.filter(s=>s.done)}))
    },...d.history]}));
    setAw(null);setPage("history");showToast("🎉 Training gespeichert!");
  };

  /* ── Body weight ── */
  const saveBodyweight=()=>{
    const val=parseFloat(bwInput);if(isNaN(val)||val<20||val>300)return showToast("⚠ Ungültiges Gewicht");
    setDb(d=>({...d,bodyweight:[...(d.bodyweight||[]),{date:Date.now(),value:val}].slice(-60)}));
    setBwInput("");showToast("✓ Körpergewicht gespeichert!");
  };

  const ws=getWeekStats();
  const totalStats=getTotalStats();

  const btnBase={border:"none",cursor:"pointer",fontFamily:"inherit",borderRadius:10,padding:"12px 18px",fontSize:12,fontWeight:700,letterSpacing:1,margin:"8px 16px",width:"calc(100% - 32px)"};
  const inp={background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontFamily:"inherit",fontSize:14,padding:"10px 12px",width:"100%",outline:"none"};
  const lbl={fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4,display:"block"};
  const hdr={padding:"20px 18px 16px",position:"sticky",top:0,background:C.bg,zIndex:50,borderBottom:`1px solid ${C.border}`};

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'DM Mono','Courier New',monospace",maxWidth:430,margin:"0 auto",paddingBottom:80}}>

      {/* PR FLASH */}
      {prFlash&&(
        <div style={{position:"fixed",inset:0,zIndex:500,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(232,255,71,0.06)"}}>
          <div className="pr-pop" style={{fontSize:72,filter:"drop-shadow(0 0 30px rgba(232,255,71,0.8))"}}>🏆</div>
        </div>
      )}

      {/* TOAST */}
      {toast&&(
        <div className="toast-enter" style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:C.green,color:"#000",borderRadius:10,padding:"10px 22px",fontSize:13,fontWeight:700,zIndex:300,whiteSpace:"nowrap",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>{toast}</div>
      )}

      {/* TIMER OVERLAY */}
      {showTimer&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:11,color:C.muted,letterSpacing:4,marginBottom:14}}>PAUSENTIMER</div>
          <div style={{fontSize:84,fontWeight:700,color:tSecs>0?C.yellow:C.green,letterSpacing:-3,transition:"color 0.4s",fontVariantNumeric:"tabular-nums"}}>{fmtTime(tSecs)}</div>
          <div style={{fontSize:11,letterSpacing:3,marginTop:8,color:tSecs>0?C.muted:C.green,transition:"color 0.4s"}}>{tSecs>0?"läuft...":"✓ fertig!"}</div>
          <div style={{display:"flex",gap:10,marginTop:30,flexWrap:"wrap",justifyContent:"center"}}>
            {[60,90,120,150].map(t=>(
              <button key={t} onClick={()=>{clearInterval(tRef.current);tEndRef.current=Date.now()+t*1000;setTSecs(t);setTRunning(true);}} style={{background:C.surface2,color:C.muted2,borderRadius:8,padding:"10px 18px",fontSize:12,fontFamily:"inherit",cursor:"pointer",border:`1px solid ${C.border}`}}>{fmtTime(t)}</button>
            ))}
          </div>
          <button onClick={()=>{clearInterval(tRef.current);setShowTimer(false);setTRunning(false);}} style={{marginTop:22,background:C.red,color:"#fff",borderRadius:10,padding:"13px 40px",fontSize:14,fontWeight:700,fontFamily:"inherit",cursor:"pointer",border:"none"}}>FERTIG</button>
        </div>
      )}

      {/* PROGRESS MODAL */}
      {progEx&&(
        <div onClick={()=>setProgEx(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:180,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div className="modal-enter" onClick={e=>e.stopPropagation()} style={{background:C.modal,borderRadius:"18px 18px 0 0",width:"100%",maxWidth:430,padding:"24px 20px 40px",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <div style={{fontSize:16,fontWeight:700}}>{progEx}</div>
                <div style={{marginTop:4}}><GroupBadge group={getGroupForName(progEx)}/></div>
              </div>
              <button onClick={()=>setProgEx(null)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 10px",fontSize:12,border:"none",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,margin:"16px 0 10px"}}>GEWICHTSENTWICKLUNG</div>
            <MiniChart data={getProgressData(progEx)} color={GROUP_COLORS[getGroupForName(progEx)]||C.yellow}/>
            <div style={{marginTop:20}}>
              {getProgressData(progEx).map((d,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                  <span style={{color:C.muted}}>{fmtDateFull(d.date)}</span>
                  <span style={{fontWeight:700,color:GROUP_COLORS[getGroupForName(progEx)]||C.yellow}}>{d.value} kg</span>
                </div>
              ))}
              {getProgressData(progEx).length===0&&<div style={{color:C.muted,fontSize:12,padding:"12px 0"}}>Noch keine Daten.</div>}
            </div>
          </div>
        </div>
      )}

      {/* MAIN MODAL */}
      {modal&&(
        <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:150,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div className="modal-enter" onClick={e=>e.stopPropagation()} style={{background:C.modal,borderRadius:"18px 18px 0 0",width:"100%",maxWidth:430,padding:"24px 20px 40px",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontSize:16,fontWeight:700}}>
                {modal==="day"?"Trainingstag erstellen":
                 modal==="exercise"?"Übung hinzufügen":
                 modal==="settings"?"Einstellungen":
                 modal==="copy"?"Übungen kopieren von":
                 modal==="bw"?"Körpergewicht":
                 `${aw?.exercises[curEx]?.name} – Satz ${(curSet??0)+1}`}
              </div>
              <button onClick={()=>setModal(null)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 10px",fontSize:12,border:"none",cursor:"pointer"}}>✕</button>
            </div>

            {modal==="day"&&<>
              <div style={{marginBottom:14}}><label style={lbl}>NAME</label><input style={inp} value={newDayName} onChange={e=>setNewDayName(e.target.value)} placeholder="z.B. Tag 2 – Rücken"/></div>
              <div style={{marginBottom:20}}><label style={lbl}>BESCHREIBUNG</label><input style={inp} value={newDayDesc} onChange={e=>setNewDayDesc(e.target.value)} placeholder="z.B. Pull Day"/></div>
              <button onClick={saveDay} style={{...btnBase,background:C.yellow,color:"#000",margin:"0",width:"100%"}}>ERSTELLEN</button>
            </>}

            {modal==="exercise"&&<>
              <div style={{marginBottom:14}}>
                <label style={lbl}>ÜBUNGSNAME</label>
                <ExerciseInput value={newExName} onChange={setNewExName}/>
                {getGroupForName(newExName)&&(
                  <div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,color:C.muted}}>Muskelgruppe:</span>
                    <GroupBadge group={getGroupForName(newExName)}/>
                  </div>
                )}
              </div>
              <div style={{marginBottom:20}}>
                <label style={lbl}>ANZAHL SÄTZE</label>
                <div style={{display:"flex",gap:8}}>
                  {[1,2,3,4,5].map(n=>(
                    <button key={n} onClick={()=>setSelSets(n)} style={{background:selSets===n?C.yellow:C.surface2,color:selSets===n?"#000":C.muted2,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit",flex:1}}>{n}</button>
                  ))}
                </div>
              </div>
              <button onClick={addExercise} style={{...btnBase,background:C.yellow,color:"#000",margin:"0 0 8px",width:"100%"}}>HINZUFÜGEN</button>
              {db.days.length>1&&<button onClick={()=>setModal("copy")} style={{...btnBase,background:C.surface2,color:C.muted2,margin:"0",width:"100%"}}>📋 VON ANDEREM TAG KOPIEREN</button>}
            </>}

            {modal==="copy"&&<>
              <div style={{fontSize:11,color:C.muted,marginBottom:16}}>Wähle einen Tag um alle Übungen zu kopieren:</div>
              {db.days.filter((_,i)=>i!==aw?.dayId).map((d,i)=>(
                <div key={i} onClick={()=>copyExercises(db.days.indexOf(d))} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
                  <div style={{fontSize:13,fontWeight:700}}>{d.name}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{d.exercises.length} Übungen</div>
                </div>
              ))}
            </>}

            {modal==="settings"&&<>
              <div style={{marginBottom:16}}>
                <label style={lbl}>DESIGN / THEME</label>
                <div style={{display:"flex",gap:8}}>
                  {Object.entries(THEMES).map(([key,th])=>{
                    const active=(db.theme||"dark")===key;
                    return(
                      <button key={key} onClick={()=>setDb(d=>({...d,theme:key}))} style={{flex:1,background:active?th.yellow:C.surface2,color:active?"#000":C.muted2,borderRadius:10,padding:"10px 6px",fontSize:10,fontWeight:700,border:`1px solid ${active?th.yellow:C.border}`,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                        <span style={{fontSize:18}}>{th.icon}</span>
                        <span>{th.name}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <label style={lbl}>BENACHRICHTIGUNGEN (Pause-Timer)</label>
                {notifPerm==="unsupported"
                  ?<div style={{fontSize:12,color:C.muted2,lineHeight:1.6}}>Nur als installierte App nutzbar.<br/>Safari → Teilen → „Zum Home-Bildschirm" (iOS 16.4+)</div>
                  :notifPerm==="granted"
                  ?<div style={{color:C.green,fontSize:13,fontWeight:700}}>🔔 Aktiviert</div>
                  :notifPerm==="denied"
                  ?<div style={{color:C.red,fontSize:12}}>Blockiert – in iOS-Einstellungen aktivieren</div>
                  :<button onClick={reqNotif} style={{...btnBase,background:C.surface2,color:C.text,margin:"0",width:"100%"}}>🔔 BENACHRICHTIGUNGEN ERLAUBEN</button>
                }
              </div>
              <button onClick={()=>{exportData();setModal(null);}} style={{...btnBase,background:C.yellow,color:"#000",margin:"0 0 8px",width:"100%"}}>📤 DATEN EXPORTIEREN</button>
              <button onClick={()=>{importData();setModal(null);}} style={{...btnBase,background:C.surface2,color:C.text,margin:"0 0 8px",width:"100%"}}>📥 DATEN IMPORTIEREN</button>
              <div style={{marginBottom:14,marginTop:8}}>
                <label style={lbl}>WOCHENZIEL (Trainingstage)</label>
                <div style={{display:"flex",gap:8}}>
                  {[2,3,4,5,6].map(n=>(
                    <button key={n} onClick={()=>setDb(d=>({...d,weekGoal:n}))} style={{background:db.weekGoal===n?C.yellow:C.surface2,color:db.weekGoal===n?"#000":C.muted2,borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit",flex:1}}>{n}</button>
                  ))}
                </div>
              </div>
              <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
                <button onClick={()=>{if(confirm("ALLE Daten löschen?")){setDb(DEF);setModal(null);showToast("Daten gelöscht");}}} style={{...btnBase,background:"#2A0A0A",color:C.red,border:`1px solid #3A1010`,margin:"0",width:"100%"}}>🗑 ALLE DATEN LÖSCHEN</button>
              </div>
            </>}

            {modal==="bw"&&<>
              <div style={{marginBottom:16}}>
                <label style={lbl}>KÖRPERGEWICHT (kg)</label>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...inp,flex:1}} type="number" inputMode="decimal" step="0.1" value={bwInput} onChange={e=>setBwInput(e.target.value)} placeholder="z.B. 82.5"/>
                  <button onClick={saveBodyweight} style={{background:C.yellow,color:"#000",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>+</button>
                </div>
              </div>
              {(db.bodyweight||[]).length>0&&<>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:12}}>VERLAUF</div>
                <MiniChart data={(db.bodyweight||[]).map(b=>({date:b.date,value:b.value}))} color={C.blue} unit="kg"/>
                <div style={{marginTop:16}}>
                  {[...(db.bodyweight||[])].reverse().slice(0,10).map((b,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                      <span style={{color:C.muted}}>{fmtDateFull(b.date)}</span>
                      <span style={{fontWeight:700,color:C.blue}}>{b.value} kg</span>
                    </div>
                  ))}
                </div>
              </>}
            </>}

            {modal==="set"&&<>
              {getLastSet(aw?.exercises[curEx]?.name)&&(
                <div style={{background:C.surface2,borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:11,color:C.muted2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>Letztes Mal: <span style={{color:C.yellow,fontWeight:700}}>{getLastSet(aw?.exercises[curEx]?.name)?.weight} kg × {getLastSet(aw?.exercises[curEx]?.name)?.reps}</span></span>
                  <button onClick={()=>{const ls=getLastSet(aw?.exercises[curEx]?.name);setSw(ls.weight||"");setSr(ls.reps||"");}} style={{background:C.yellow,color:"#000",border:"none",borderRadius:5,padding:"3px 10px",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>↑ ÜBERNEHMEN</button>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
                <div><label style={lbl}>GEWICHT (kg)</label><input style={inp} type="number" inputMode="decimal" step="0.5" value={sw} onChange={e=>setSw(e.target.value)} placeholder="0" autoFocus/></div>
                <div><label style={lbl}>WIEDERHOLUNGEN</label><input style={inp} type="number" inputMode="numeric" value={sr} onChange={e=>setSr(e.target.value)} placeholder="0"/></div>
              </div>
              <label style={{...lbl,marginBottom:10}}>PAUSE STARTEN & SPEICHERN</label>
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                {[60,90,120,150].map(t=>(
                  <button key={t} onClick={()=>saveSetData(t)} style={{background:C.surface2,color:C.muted2,borderRadius:8,padding:"9px 14px",fontSize:12,border:`1px solid ${C.border}`,cursor:"pointer",fontFamily:"inherit",flex:1}}>{fmtTime(t)}</button>
                ))}
              </div>
              <button onClick={()=>saveSetData(null)} style={{...btnBase,background:C.yellow,color:"#000",margin:"0 0 8px",width:"100%"}}>✓ SATZ SPEICHERN</button>
              <button onClick={()=>{if(confirm("Satz löschen?")){deleteSet(curEx,curSet);setModal(null);}}} style={{...btnBase,background:"#2A0A0A",color:C.red,border:`1px solid #3A1010`,margin:"0",width:"100%"}}>🗑 SATZ LÖSCHEN</button>
            </>}
          </div>
        </div>
      )}

      {/* ── HOME ── */}
      {page==="home"&&<>
        <div style={hdr}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>DEINE PLÄNE</div>
              <div style={{fontSize:24,fontWeight:700,letterSpacing:-1}}>GymLog 🏋️</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal("bw")} style={{background:C.surface2,color:C.blue,borderRadius:8,padding:"8px 12px",fontSize:16,border:"none",cursor:"pointer"}}>⚖️</button>
              <button onClick={()=>setModal("settings")} style={{background:C.surface2,color:C.muted2,borderRadius:8,padding:"8px 12px",fontSize:16,border:"none",cursor:"pointer"}}>⚙️</button>
            </div>
          </div>
        </div>

        {/* WEEK STATS */}
        <div style={{margin:"12px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:10}}>DIESE WOCHE</div>
          <div style={{display:"flex"}}>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,color:ws.count>=ws.goal?C.green:C.yellow}}>{ws.count}<span style={{fontSize:14,color:C.muted}}>/{ws.goal}</span></div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>TRAININGS</div>
            </div>
            <div style={{width:1,background:C.border}}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,color:C.orange}}>{ws.streak}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>WOCHEN STREAK 🔥</div>
            </div>
          </div>
          <div style={{marginTop:12,height:6,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min((ws.count/ws.goal)*100,100)}%`,background:ws.count>=ws.goal?C.green:C.yellow,borderRadius:3,transition:"width 0.4s"}}/>
          </div>
          {ws.count>=ws.goal&&<div style={{fontSize:11,color:C.green,marginTop:8,textAlign:"center"}}>🎉 Wochenziel erreicht!</div>}
        </div>

        {/* TOTAL STATS */}
        <div style={{margin:"8px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px"}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:12}}>GESAMT</div>
          <div style={{display:"flex"}}>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:C.blue}}>{totalStats.sessions}</div>
              <div style={{fontSize:9,color:C.muted,marginTop:2,letterSpacing:1}}>SESSIONS</div>
            </div>
            <div style={{width:1,background:C.border}}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:C.orange}}>
                {totalStats.volume>999999?`${(totalStats.volume/1000000).toFixed(1)}Mio`:totalStats.volume>9999?`${(totalStats.volume/1000).toFixed(1)}t`:`${totalStats.volume}`}
              </div>
              <div style={{fontSize:9,color:C.muted,marginTop:2,letterSpacing:1}}>VOLUMEN (KG)</div>
            </div>
            <div style={{width:1,background:C.border}}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:C.green}}>{Math.round(totalStats.time/3600)}h</div>
              <div style={{fontSize:9,color:C.muted,marginTop:2,letterSpacing:1}}>TRAININGSZEIT</div>
            </div>
          </div>
          {db.history.length>=2&&<>
            <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginTop:16,marginBottom:10}}>WÖCHENTLICHES VOLUMEN</div>
            <VolumeBarChart history={db.history}/>
          </>}
        </div>

        {/* PLAN CARDS */}
        {db.days.length===0&&<div style={{textAlign:"center",color:C.muted,padding:"30px 20px",fontSize:13}}>Noch kein Trainingstag.<br/>Erstelle deinen ersten Plan!</div>}
        {db.days.map((d,i)=>{
          const groups=[...new Set(d.exercises.map(e=>e.group||getGroupForName(e.name)).filter(Boolean))];
          return(
            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"8px 16px",overflow:"hidden"}}>
              <div onClick={()=>startWorkout(i)} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700}}>{d.name}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{d.desc} · {d.exercises.length} Übungen</div>
                  {groups.length>0&&(
                    <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                      {groups.map(g=><GroupBadge key={g} group={g}/>)}
                    </div>
                  )}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:10}}>
                  <button onClick={e=>{e.stopPropagation();deleteDay(i);}} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"5px 10px",fontSize:12,border:"none",cursor:"pointer"}}>🗑</button>
                  <span style={{color:C.yellow,fontSize:22,fontWeight:700}}>›</span>
                </div>
              </div>
            </div>
          );
        })}
        <button onClick={()=>setModal("day")} style={{...btnBase,background:C.yellow,color:"#000"}}>+ TRAININGSTAG ERSTELLEN</button>
      </>}

      {/* ── WORKOUT ── */}
      {page==="workout"&&<>
        <div style={hdr}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>{fmtDateFull(aw?.startTime||Date.now())}</div>
              <div style={{fontSize:22,fontWeight:700,letterSpacing:-1}}>{aw?.dayName||"–"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:700,color:C.yellow,fontVariantNumeric:"tabular-nums"}}>{fmtTime(wSecs)}</div>
              <div style={{fontSize:9,color:C.muted,letterSpacing:2}}>DAUER</div>
            </div>
          </div>
          {aw&&<>
            <div style={{marginTop:10,height:4,background:C.surface2,borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${getWorkoutProgress()*100}%`,background:getWorkoutProgress()===1?C.green:C.yellow,borderRadius:2,transition:"width 0.4s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
              <div style={{fontSize:11,color:C.muted2}}>Volumen: <span style={{color:C.orange,fontWeight:700}}>{Math.round(calcVolume(aw.exercises)).toLocaleString()} kg</span></div>
              <div style={{fontSize:11,color:C.muted}}>{Math.round(getWorkoutProgress()*100)}% fertig</div>
            </div>
          </>}
        </div>

        {!aw&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>Kein aktives Training.<br/>Gehe zu PLÄNE.</div>}

        {aw?.exercises.map((ex,ei)=>{
          const groupColor=GROUP_COLORS[ex.group]||C.muted;
          const doneCount=ex.sets.filter(s=>s.done).length;
          const allDone=doneCount===ex.sets.length&&ex.sets.length>0;
          return(
            <div key={ei} style={{background:C.surface,border:`1px solid ${allDone?C.green:C.border}`,borderRadius:12,margin:"8px 16px",overflow:"hidden",transition:"border-color 0.4s"}}>
              <div style={{padding:"10px 12px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <div style={{fontSize:13,fontWeight:700}}>{ex.name}</div>
                    <GroupBadge group={ex.group}/>
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginTop:3}}>
                    <span style={{color:allDone?C.green:C.muted2}}>{doneCount}/{ex.sets.length} Sätze</span>
                    {" · "}Vol: {Math.round(ex.sets.reduce((s,set)=>s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0))} kg
                  </div>
                </div>
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>moveEx(ei,-1)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>↑</button>
                  <button onClick={()=>moveEx(ei,1)} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>↓</button>
                  <button onClick={()=>setProgEx(ex.name)} style={{background:C.surface2,color:C.blue,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>📈</button>
                  <button onClick={()=>{tEndRef.current=Date.now()+90*1000;setTSecs(90);setTRunning(true);setShowTimer(true);}} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>⏱</button>
                  <button onClick={()=>{if(confirm("Übung entfernen?"))setAw(w=>({...w,exercises:w.exercises.filter((_,i)=>i!==ei)}));}} style={{background:C.surface2,color:C.muted2,borderRadius:6,padding:"4px 7px",fontSize:11,border:"none",cursor:"pointer"}}>🗑</button>
                </div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr>
                    {["SATZ","KG","WDHL","STATUS"].map(h=><th key={h} style={{fontSize:9,color:C.muted,letterSpacing:2,padding:"4px 12px",textAlign:"left",borderBottom:`1px solid ${C.border}`,fontWeight:400}}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {ex.sets.map((set,si)=>(
                    <tr key={si} onClick={()=>openSetModal(ei,si)} style={{cursor:"pointer",color:set.done?C.green:C.text,background:set.done?"rgba(71,255,200,0.04)":"transparent",transition:"background 0.2s"}}>
                      <td style={{padding:"9px 12px",fontSize:13,borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>{si+1}</td>
                      <td style={{padding:"9px 12px",fontSize:13,fontWeight:set.done?700:400,borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>{set.weight||"–"}</td>
                      <td style={{padding:"9px 12px",fontSize:13,fontWeight:set.done?700:400,borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>{set.reps||"–"}{set.isPR?" 🏆":""}</td>
                      <td style={{padding:"9px 12px",borderBottom:si<ex.sets.length-1?`1px solid #181818`:"none"}}>
                        <div style={{background:set.done?C.green:C.surface2,color:set.done?"#000":C.muted,borderRadius:6,padding:"3px 10px",fontSize:11,display:"inline-flex",alignItems:"center",gap:4,fontWeight:set.done?700:400,transition:"all 0.25s"}}>{set.done?"✓":"○"}</div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <button onClick={()=>addSet(ei)} style={{width:"100%",background:"transparent",border:"none",borderTop:`1px solid ${C.border}`,color:C.muted,fontSize:11,padding:"9px",cursor:"pointer",fontFamily:"inherit",letterSpacing:2}}>+ SATZ HINZUFÜGEN</button>
            </div>
          );
        })}

        <button onClick={()=>setModal("exercise")} style={{...btnBase,background:C.surface2,color:C.muted2}}>+ ÜBUNG HINZUFÜGEN</button>
        {aw&&<button onClick={finishWorkout} style={{...btnBase,background:C.green,color:"#000"}}>✓ TRAINING ABSCHLIESSEN</button>}
        {aw&&<button onClick={()=>{if(confirm("Abbrechen?")){setAw(null);setPage("home");}}} style={{...btnBase,background:"#2A0A0A",color:C.red,border:`1px solid #3A1010`}}>TRAINING ABBRECHEN</button>}
      </>}

      {/* ── HISTORY ── */}
      {page==="history"&&<>
        <div style={hdr}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>VERLAUF</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:-1}}>Historie</div>
        </div>
        {db.history.length===0&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>Noch keine Trainings aufgezeichnet.</div>}
        {db.history.map((h,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"10px 16px",overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4}}>{fmtDateFull(h.date)}</div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{h.dayName}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[`⏱ ${fmtTime(h.duration)}`,`📋 ${h.exercises.length} Übungen`,`💪 ${h.exercises.reduce((s,e)=>s+e.sets.length,0)} Sätze`,`🔥 ${Math.round(h.volume||0).toLocaleString()} kg`].map(t=>(
                  <span key={t} style={{background:C.surface2,borderRadius:6,padding:"3px 10px",fontSize:11,color:C.muted2}}>{t}</span>
                ))}
              </div>
            </div>
            {h.exercises.map((ex,ei)=>(
              <div key={ei} style={{padding:"8px 16px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{fontSize:12,fontWeight:700}}>{ex.name}</div>
                    <GroupBadge group={ex.group||getGroupForName(ex.name)}/>
                  </div>
                  <button onClick={()=>setProgEx(ex.name)} style={{background:"transparent",color:C.blue,border:"none",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>📈</button>
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {ex.sets.map((s,si)=>(
                    <span key={si} style={{background:C.surface2,borderRadius:6,padding:"3px 8px",fontSize:11,color:s.isPR?C.yellow:C.muted2}}>
                      {s.weight}kg×{s.reps}{s.isPR?" 🏆":""}
                    </span>
                  ))}
                </div>
              </div>
            ))}
            <div style={{padding:"10px 16px"}}>
              <button onClick={()=>{if(confirm("Löschen?"))setDb(d=>({...d,history:d.history.filter((_,idx)=>idx!==i)}));}} style={{background:"#2A0A0A",color:C.red,border:"1px solid #3A1010",borderRadius:8,padding:"6px 14px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>Löschen</button>
            </div>
          </div>
        ))}
      </>}

      {/* ── PRs ── */}
      {page==="pr"&&<>
        <div style={hdr}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,marginBottom:4}}>BESTLEISTUNGEN</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:-1}}>PRs & Graphs 📈</div>
        </div>
        {Object.keys(db.prs).length===0&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>Noch keine PRs. Fang an zu trainieren!</div>}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"10px 16px",overflow:"hidden"}}>
          {Object.keys(db.prs).sort((a,b)=>db.prs[b].vol-db.prs[a].vol).map(k=>{
            const group=getGroupForName(k);
            return(
              <div key={k} style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                    <div style={{fontSize:13,fontWeight:700}}>{k}</div>
                    <GroupBadge group={group}/>
                  </div>
                  <div style={{fontSize:10,color:C.muted}}>{fmtDateFull(db.prs[k].date)}</div>
                  <button onClick={()=>setProgEx(k)} style={{background:"transparent",color:C.blue,border:"none",fontSize:11,cursor:"pointer",padding:"4px 0 0",fontFamily:"inherit"}}>📈 Entwicklung</button>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:700,color:C.yellow}}>{db.prs[k].weight} kg</div>
                  <div style={{fontSize:11,color:C.muted}}>× {db.prs[k].reps} Wdhl.</div>
                </div>
              </div>
            );
          })}
        </div>
        {getAllExNames().length>0&&<>
          <div style={{fontSize:10,color:C.muted,letterSpacing:3,padding:"16px 16px 8px"}}>ALLE ÜBUNGEN</div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,margin:"0 16px 16px",overflow:"hidden"}}>
            {getAllExNames().map(name=>{
              const group=getGroupForName(name);
              return(
                <div key={name} onClick={()=>setProgEx(name)} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{name}</div>
                    {group&&<div style={{marginTop:3}}><GroupBadge group={group}/></div>}
                  </div>
                  <span style={{color:C.blue,fontSize:16}}>📈</span>
                </div>
              );
            })}
          </div>
        </>}
      </>}

      {/* ── NAV (fixed) ── */}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.navBg,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,padding:"8px 0 max(12px, env(safe-area-inset-bottom))"}}>
        {[{id:"home",label:"PLÄNE",icon:"🏠"},{id:"workout",label:"TRAINING",icon:"⏱"},{id:"history",label:"VERLAUF",icon:"📋"},{id:"pr",label:"PRs",icon:"📈"}].map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"transparent",border:"none",color:page===n.id?C.yellow:C.muted,fontSize:8,letterSpacing:1,padding:"4px 0",cursor:"pointer",fontFamily:"inherit",transition:"color 0.2s"}}>
            <span style={{fontSize:20,lineHeight:1}}>{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
