<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymLog">
<title>GymLog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--surface:#141414;--surface2:#1E1E1E;--border:#252525;--text:#F0F0F0;--muted:#555;--muted2:#888;--yellow:#E8FF47;--green:#47FFC8;--orange:#FF8C47;--red:#FF4747}
body{background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0D0D0D;border-top:1px solid var(--border);display:flex;padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;color:var(--muted);font-size:9px;letter-spacing:1px;padding:4px 0}
.nav-btn.active{color:var(--yellow)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.page{display:none;padding:0 0 16px}.page.active{display:block}
.page-header{padding:calc(env(safe-area-inset-top,44px) + 12px) 18px 16px;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--border)}
.page-title{font-size:22px;font-weight:700;letter-spacing:-1px}
.page-sub{font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin:10px 16px;overflow:hidden}
.day-item{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.day-item:last-child{border-bottom:none}
.day-name{font-size:14px;font-weight:700}
.day-meta{font-size:11px;color:var(--muted);margin-top:3px}
.btn-add{background:var(--yellow);color:#000;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:1px;margin:12px 16px;width:calc(100% - 32px)}
.btn-secondary{background:var(--surface2);color:var(--muted2);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:1px;margin:8px 16px;width:calc(100% - 32px)}
.btn-danger{background:#2A0A0A;color:var(--red);border:1px solid #3A1010;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:1px;margin:4px 16px;width:calc(100% - 32px)}
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:8px 16px}
.ex-head{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.ex-title{font-size:13px;font-weight:700}
.ex-actions{display:flex;gap:8px}
.icon-btn{background:var(--surface2);color:var(--muted2);border-radius:6px;padding:4px 8px;font-size:12px}
.sets-table{width:100%;border-collapse:collapse}
.sets-table th{font-size:9px;color:var(--muted);letter-spacing:2px;padding:4px 14px;text-align:left;border-bottom:1px solid var(--border)}
.sets-table td{padding:6px 14px;font-size:13px;border-bottom:1px solid #181818}
.sets-table tr:last-child td{border-bottom:none}
.set-row-done td{color:var(--green)}
.input-field{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;width:100%}
.input-field:focus{outline:none;border-color:var(--yellow)}
.input-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;display:block}
.form-group{margin-bottom:14px;padding:0 16px}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;font-family:inherit}
.timer-overlay.show{display:flex}
.timer-big{font-size:72px;font-weight:700;letter-spacing:-2px;color:var(--yellow)}
.timer-big.done{color:var(--green)}
.timer-label{font-size:11px;color:var(--muted);letter-spacing:4px;margin-bottom:20px;margin-top:8px}
.timer-btns{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.timer-preset{background:var(--surface2);color:var(--muted2);border-radius:8px;padding:10px 16px;font-size:12px;font-family:inherit}
.timer-stop{background:var(--red);color:#fff;border-radius:10px;padding:12px 32px;font-size:14px;font-weight:700;font-family:inherit}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:150;display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#111;border-radius:18px 18px 0 0;width:100%;max-width:430px;padding:24px 20px calc(env(safe-area-inset-bottom,0px) + 24px);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
.modal-close{float:right;background:var(--surface2);color:var(--muted2);border-radius:6px;padding:4px 10px;font-size:12px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px}
.chip{display:inline-block;background:var(--surface2);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--muted2);margin:3px;cursor:pointer}
.pr-item{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pr-item:last-child{border-bottom:none}
.pr-name{font-size:13px;font-weight:700}
.pr-val{font-size:20px;font-weight:700;color:var(--yellow)}
.history-item{padding:12px 16px;border-bottom:1px solid var(--border)}
.stat-pill{background:var(--surface2);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--muted2)}
</style>
</head>
<body>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-label">PAUSENTIMER</div>
  <div class="timer-big" id="timerBig">01:30</div>
  <div class="timer-label" id="timerStatus">läuft...</div>
  <div class="timer-btns">
    <button class="timer-preset" onclick="setTimer(60)">1 min</button>
    <button class="timer-preset" onclick="setTimer(90)">1:30</button>
    <button class="timer-preset" onclick="setTimer(120)">2 min</button>
    <button class="timer-preset" onclick="setTimer(150)">2:30</button>
  </div>
  <div style="margin-top:16px"><button class="timer-stop" onclick="closeTimer()">FERTIG</button></div>
</div>

<div class="modal" id="modalDay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modalDay')">✕</button>
    <div class="modal-title">Trainingstag erstellen</div>
    <div class="form-group"><label class="input-label">NAME</label><input class="input-field" id="newDayName" placeholder="z.B. Tag 1 – Brust/Schulter"></div>
    <div class="form-group"><label class="input-label">BESCHREIBUNG</label><input class="input-field" id="newDayDesc" placeholder="z.B. Push Day"></div>
    <button class="btn-add" onclick="saveNewDay()">ERSTELLEN</button>
  </div>
</div>

<div class="modal" id="modalExercise">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modalExercise')">✕</button>
    <div class="modal-title">Übung hinzufügen</div>
    <div class="form-group"><label class="input-label">ÜBUNGSNAME</label><input class="input-field" id="newExName" placeholder="z.B. Bankdrücken"></div>
    <div class="form-group"><label class="input-label">ANZAHL SÄTZE</label>
      <div id="setChips"><button class="chip" onclick="selectSets(this,1)">1</button><button class="chip" onclick="selectSets(this,2)">2</button><button class="chip" onclick="selectSets(this,3)" style="background:var(--yellow);color:#000">3</button><button class="chip" onclick="selectSets(this,4)">4</button><button class="chip" onclick="selectSets(this,5)">5</button></div>
    </div>
    <button class="btn-add" onclick="saveNewExercise()">HINZUFÜGEN</button>
  </div>
</div>

<div class="modal" id="modalSet">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modalSet')">✕</button>
    <div class="modal-title" id="modalSetTitle">Satz eintragen</div>
    <div class="form-group"><div class="form-row">
      <div><label class="input-label">GEWICHT kg</label><input class="input-field" id="setWeight" type="number" inputmode="decimal" placeholder="0" step="0.5"></div>
      <div><label class="input-label">WDHL.</label><input class="input-field" id="setReps" type="number" inputmode="numeric" placeholder="0"></div>
      <div><label class="input-label">RIR</label><input class="input-field" id="setRIR" type="number" inputmode="numeric" placeholder="–"></div>
    </div></div>
    <div class="form-group"><label class="input-label">PAUSE STARTEN & SPEICHERN</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="chip" onclick="startTimerAndSave(60)">1 min</button>
        <button class="chip" onclick="startTimerAndSave(90)">1:30</button>
        <button class="chip" onclick="startTimerAndSave(120)">2 min</button>
        <button class="chip" onclick="startTimerAndSave(150)">2:30</button>
      </div>
    </div>
    <button class="btn-add" onclick="saveSet()">SATZ SPEICHERN</button>
  </div>
</div>

<div class="page active" id="page-home">
  <div class="page-header"><div class="page-sub">DEINE PLÄNE</div><div class="page-title">GymLog 🏋️</div></div>
  <div id="daysList"></div>
  <button class="btn-add" onclick="openModal('modalDay')">+ TRAININGSTAG ERSTELLEN</button>
</div>

<div class="page" id="page-workout">
  <div class="page-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="page-sub" id="workoutSub">TRAINING</div><div class="page-title" id="workoutTitle">–</div></div>
      <div style="text-align:right"><div style="font-size:20px;font-weight:700;color:var(--yellow)" id="workoutTimer">00:00</div><div style="font-size:9px;color:var(--muted);letter-spacing:2px">DAUER</div></div>
    </div>
  </div>
  <div id="exerciseList"></div>
  <button class="btn-secondary" onclick="openModal('modalExercise')">+ ÜBUNG HINZUFÜGEN</button>
  <button class="btn-add" style="background:var(--green)" onclick="finishWorkout()">✓ TRAINING ABSCHLIESSEN</button>
  <button class="btn-danger" onclick="cancelWorkout()">TRAINING ABBRECHEN</button>
</div>

<div class="page" id="page-history">
  <div class="page-header"><div class="page-sub">VERLAUF</div><div class="page-title">Historie</div></div>
  <div id="historyList"></div>
</div>

<div class="page" id="page-pr">
  <div class="page-header"><div class="page-sub">BESTLEISTUNGEN</div><div class="page-title">Personal Records 🏆</div></div>
  <div id="prList"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>PLÄNE
  </button>
  <button class="nav-btn" onclick="showPage('workout')" id="nav-workout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>TRAINING
  </button>
  <button class="nav-btn" onclick="showPage('history')" id="nav-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>VERLAUF
  </button>
  <button class="nav-btn" onclick="showPage('pr')" id="nav-pr">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>PRs
  </button>
</nav>

<script>
let db=JSON.parse(localStorage.getItem('gymlog_v3')||'{"days":[],"history":[],"prs":{}}');
let activeWorkout=null,workoutTimerInterval=null,currentExIdx=null,currentSetIdx=null,selectedSets=3,timerInterval=null,timerSeconds=0;
function save(){localStorage.setItem('gymlog_v3',JSON.stringify(db));}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function fmtDate(ts){return new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('nav-'+n).classList.add('active');
  if(n==='home')renderDays();if(n==='workout')renderWorkout();if(n==='history')renderHistory();if(n==='pr')renderPRs();
}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function renderDays(){
  const el=document.getElementById('daysList');
  if(!db.days.length){el.innerHTML='<div class="empty">Noch kein Trainingstag.<br>Erstelle deinen ersten Plan!</div>';return;}
  el.innerHTML=db.days.map((d,i)=>`<div class="card"><div class="day-item" onclick="startWorkout(${i})"><div><div class="day-name">${d.name}</div><div class="day-meta">${d.desc||''} · ${d.exercises.length} Übungen</div></div><div style="display:flex;align-items:center;gap:10px"><button class="icon-btn" onclick="event.stopPropagation();deleteDay(${i})">🗑</button><span style="color:var(--muted);font-size:18px">›</span></div></div></div>`).join('');
}
function saveNewDay(){
  const name=document.getElementById('newDayName').value.trim();
  if(!name)return alert('Bitte Namen eingeben');
  db.days.push({name,desc:document.getElementById('newDayDesc').value.trim(),exercises:[]});
  save();closeModal('modalDay');document.getElementById('newDayName').value='';document.getElementById('newDayDesc').value='';renderDays();
}
function deleteDay(i){if(!confirm('Tag löschen?'))return;db.days.splice(i,1);save();renderDays();}
function startWorkout(dayIdx){
  const day=db.days[dayIdx];
  activeWorkout={dayId:dayIdx,dayName:day.name,startTime:Date.now(),exercises:day.exercises.map(e=>({name:e.name,sets:Array(e.sets).fill(null).map(()=>({weight:'',reps:'',rir:'',done:false}))}))};
  clearInterval(workoutTimerInterval);
  workoutTimerInterval=setInterval(()=>{const s=Math.floor((Date.now()-activeWorkout.startTime)/1000);const el=document.getElementById('workoutTimer');if(el)el.textContent=fmtTime(s);},1000);
  showPage('workout');
}
function renderWorkout(){
  if(!activeWorkout){document.getElementById('exerciseList').innerHTML='<div class="empty">Kein aktives Training.<br>Wähle einen Trainingstag.</div>';document.getElementById('workoutTitle').textContent='Kein Training';document.getElementById('workoutSub').textContent='';return;}
  document.getElementById('workoutTitle').textContent=activeWorkout.dayName;
  document.getElementById('workoutSub').textContent=fmtDate(activeWorkout.startTime);
  document.getElementById('exerciseList').innerHTML=activeWorkout.exercises.map((ex,ei)=>{
    const done=ex.sets.filter(s=>s.done).length;
    return`<div class="exercise-card"><div class="ex-head"><div><div class="ex-title">${ex.name}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${done}/${ex.sets.length} Sätze</div></div><div class="ex-actions"><button class="icon-btn" onclick="openTimer(90)">⏱</button><button class="icon-btn" onclick="removeExercise(${ei})">🗑</button></div></div><table class="sets-table"><tr><th>SATZ</th><th>KG</th><th>WDHL.</th><th>RIR</th><th></th></tr>${ex.sets.map((s,si)=>`<tr class="${s.done?'set-row-done':''}"><td>${si+1}</td><td>${s.weight||'–'}</td><td>${s.reps||'–'}</td><td>${s.rir!==''&&s.rir!==undefined?s.rir:'–'}</td><td><button style="background:${s.done?'var(--green)':'var(--surface2)'};color:${s.done?'#000':'var(--muted2)'};border-radius:6px;padding:4px 10px;font-size:12px;font-family:inherit" onclick="openSetModal(${ei},${si})">${s.done?'✓':'+'}</button></td></tr>`).join('')}</table></div>`;
  }).join('');
}
function openSetModal(ei,si){
  currentExIdx=ei;currentSetIdx=si;
  const s=activeWorkout.exercises[ei].sets[si];
  document.getElementById('modalSetTitle').textContent=activeWorkout.exercises[ei].name+' – Satz '+(si+1);
  document.getElementById('setWeight').value=s.weight||'';document.getElementById('setReps').value=s.reps||'';document.getElementById('setRIR').value=s.rir!==undefined?s.rir:'';
  openModal('modalSet');
}
function saveSet(){
  if(currentExIdx===null)return;
  const w=document.getElementById('setWeight').value,r=document.getElementById('setReps').value,rir=document.getElementById('setRIR').value;
  const s=activeWorkout.exercises[currentExIdx].sets[currentSetIdx];
  s.weight=w;s.reps=r;s.rir=rir;s.done=true;
  const exName=activeWorkout.exercises[currentExIdx].name;
  const vol=parseFloat(w)*parseInt(r);
  if(!isNaN(vol)&&(!db.prs[exName]||vol>db.prs[exName].vol)){db.prs[exName]={vol,weight:w,reps:r,date:Date.now()};s.isPR=true;}
  save();closeModal('modalSet');renderWorkout();
}
function startTimerAndSave(sec){saveSet();openTimer(sec);}
function removeExercise(i){if(!confirm('Übung entfernen?'))return;activeWorkout.exercises.splice(i,1);renderWorkout();}
function finishWorkout(){
  if(!activeWorkout)return;
  if(!confirm('Training abschliessen?'))return;
  db.history.unshift({date:activeWorkout.startTime,dayName:activeWorkout.dayName,duration:Math.floor((Date.now()-activeWorkout.startTime)/1000),exercises:activeWorkout.exercises.map(ex=>({name:ex.name,sets:ex.sets.filter(s=>s.done)}))});
  save();clearInterval(workoutTimerInterval);activeWorkout=null;showPage('history');
}
function cancelWorkout(){if(!confirm('Abbrechen?'))return;clearInterval(workoutTimerInterval);activeWorkout=null;showPage('home');}
function selectSets(btn,n){document.querySelectorAll('#setChips .chip').forEach(b=>{b.style.background='var(--surface2)';b.style.color='var(--muted2)';});btn.style.background='var(--yellow)';btn.style.color='#000';selectedSets=n;}
function saveNewExercise(){
  if(!activeWorkout)return alert('Kein aktives Training');
  const name=document.getElementById('newExName').value.trim();if(!name)return alert('Bitte Namen eingeben');
  activeWorkout.exercises.push({name,sets:Array(selectedSets).fill(null).map(()=>({weight:'',reps:'',rir:'',done:false}))});
  const day=db.days[activeWorkout.dayId];if(day&&!day.exercises.find(e=>e.name===name)){day.exercises.push({name,sets:selectedSets});save();}
  closeModal('modalExercise');document.getElementById('newExName').value='';renderWorkout();
}
function openTimer(sec){
  timerSeconds=sec;document.getElementById('timerOverlay').classList.add('show');
  document.getElementById('timerBig').className='timer-big';document.getElementById('timerStatus').textContent='läuft...';
  clearInterval(timerInterval);updateTimerDisplay();
  timerInterval=setInterval(()=>{timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){clearInterval(timerInterval);document.getElementById('timerBig').className='timer-big done';document.getElementById('timerBig').textContent='00:00';document.getElementById('timerStatus').textContent='✓ fertig!';}},1000);
}
function setTimer(sec){clearInterval(timerInterval);openTimer(sec);}
function updateTimerDisplay(){document.getElementById('timerBig').textContent=fmtTime(timerSeconds);}
function closeTimer(){clearInterval(timerInterval);document.getElementById('timerOverlay').classList.remove('show');}
function renderHistory(){
  const el=document.getElementById('historyList');
  if(!db.history.length){el.innerHTML='<div class="empty">Noch keine abgeschlossenen Trainings.</div>';return;}
  el.innerHTML=db.history.map((h,i)=>`<div class="card"><div class="history-item"><div style="font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px">${fmtDate(h.date)}</div><div style="font-size:14px;font-weight:700;margin-bottom:8px">${h.dayName}</div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="stat-pill">⏱ ${fmtTime(h.duration)}</span><span class="stat-pill">📋 ${h.exercises.length} Übungen</span><span class="stat-pill">💪 ${h.exercises.reduce((s,e)=>s+e.sets.length,0)} Sätze</span></div></div>${h.exercises.map(ex=>`<div style="padding:8px 16px;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:700;margin-bottom:4px">${ex.name}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${ex.sets.map(s=>`<span style="background:var(--surface2);border-radius:6px;padding:3px 8px;font-size:11px;color:${s.isPR?'var(--yellow)':'var(--muted2)'}">${s.weight}kg×${s.reps}${s.isPR?' 🏆':''}</span>`).join('')}</div></div>`).join('')}<div style="padding:10px 16px"><button style="background:#2A0A0A;color:var(--red);border:1px solid #3A1010;border-radius:8px;padding:6px 14px;font-size:11px;font-family:inherit;cursor:pointer" onclick="deleteHistory(${i})">Löschen</button></div></div>`).join('');
}
function deleteHistory(i){if(!confirm('Eintrag löschen?'))return;db.history.splice(i,1);save();renderHistory();}
function renderPRs(){
  const el=document.getElementById('prList');const keys=Object.keys(db.prs);
  if(!keys.length){el.innerHTML='<div class="empty">Noch keine PRs.<br>Trage Sätze ein um Bestleistungen zu tracken!</div>';return;}
  el.innerHTML='<div class="card">'+keys.sort((a,b)=>db.prs[b].vol-db.prs[a].vol).map(k=>`<div class="pr-item"><div><div class="pr-name">${k}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${fmtDate(db.prs[k].date)}</div></div><div style="text-align:right"><div class="pr-val">${db.prs[k].weight} kg</div><div style="font-size:11px;color:var(--muted)">× ${db.prs[k].reps} Wdhl.</div></div></div>`).join('')+'</div>';
}
function init(){
